{% extends "base.html" %}

{% block title %}Contribute Tutorial{% endblock %}

{% block content %}

<div class="container py-5">

    <!-- Heading -->
    <div class="text-center mb-5">
        <h2 class="fw-bold">Contribute Knowledge</h2>
        <p class="text-muted">Share your sustainability ideas and help the community 🌍</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card shadow-lg border-0 rounded-4 p-4">

                <form method="POST">

                    <!-- Title -->
                    <div class="mb-3">
                        <label class="form-label">Tutorial Title</label>
                        <input type="text" name="title" class="form-control"
                            placeholder="Enter tutorial title..." required>
                    </div>

                    <!-- Category -->
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select name="category" class="form-select" required>
                            <option value="">Select Category</option>
                            <option value="waste">Waste Management</option>
                            <option value="chemistry">Green Chemistry</option>
                            <option value="recycling">Recycling</option>
                            <option value="sustainability">Sustainability</option>
                        </select>
                    </div>

                    <!-- Content -->
                    <div class="mb-3">
                        <label class="form-label">Content</label>
                        <textarea name="content" rows="6" class="form-control"
                            placeholder="Write your tutorial in detail..." required></textarea>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn btn-success w-100">
                        Submit for Review
                    </button>

                </form>

            </div>

            <!-- Info Section -->
            <div class="mt-4 text-center text-muted">
                <small>
                    📌 Your tutorial will be reviewed by moderators before publishing.<br>
                    🎯 Earn <strong>50 points</strong> when approved!
                </small>
            </div>

        </div>
    </div>

</div>

{% endblock %}
